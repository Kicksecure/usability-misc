## For VirtualBox version 7.1.18
##
## Prevent KVM and VirtualBox from conflicting. This does not break the
## ability to use KVM virtual machines, it simply keeps KVM from being active
## when unneeded so that VirtualBox can run.
## Upstream issue:
## [Bug]: vboxdrv triggers a kernel BUG during load and all VMs fail to start if kernel.kptr_restrict=2 sysctl is set
## https://github.com/VirtualBox/virtualbox/issues/188
## See also:
## https://bugs.debian.org/cgi-bin/bugreport.cgi?bug=1082157#29
## https://forums.kicksecure.com/t/recent-versions-of-virtualbox-7-1-18-7-2-8-can-cause-a-system-crash-during-package-upgrades-vms-may-fail-to-start/1683
##
## For VirtualBox version 7.2.10
##
## Host freezes when attempting to start a VM.
## Upstream issue:
## [Bug]: Host freeze on VM start
## https://github.com/VirtualBox/virtualbox/issues/711
##
## Therefore out-commented.
#options kvm enable_virt_at_load=0
